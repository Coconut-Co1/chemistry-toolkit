<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemistry Tool Kit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
padding:30px;
color:#e2e8f0;
}
.wrapper{max-width:1000px;margin:auto}
.hero{
text-align:center;
padding:40px 20px;
margin-bottom:25px;
}
.hero h1{
font-size:3rem;
margin-bottom:10px;
}
.hero p{
color:#cbd5e1;
}
.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.1);
border-radius:20px;
padding:25px;
margin-bottom:25px;
box-shadow:0 8px 30px rgba(0,0,0,.25);
}
h2{margin-bottom:15px}
.input-row{
display:flex;
gap:12px;
flex-wrap:wrap;
}
input{
flex:1;
min-width:250px;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
background:#f8fafc;
}
button{
padding:14px 20px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
font-weight:700;
cursor:pointer;
transition:.2s;
}
button:hover{
transform:translateY(-2px);
}
.result{
margin-top:15px;
padding:15px;
border-radius:12px;
background:#dcfce7;
color:#166534;
font-weight:bold;
}
.info{
margin-top:15px;
padding:15px;
border-radius:12px;
background:#eff6ff;
color:#1e3a8a;
}
.footer{
text-align:center;
opacity:.8;
margin-top:20px;
}
</style>
</head>
<body>
<div class="wrapper">

<div class="hero">
<h1>🧪 Chemistry Tool Kit</h1>
<p>ดุลสมการเคมี • แปลงหน่วย • คำนวณโมล</p>
</div>

<div class="card">
<h2>⚖️ ดุลสมการเคมี</h2>
<div class="input-row">
<input id="equationInput" placeholder="เช่น H2 + O2 = H2O">
<button onclick="processEquation()">ดุลสมการ</button>
</div>
<div id="result"></div>
</div>

<div class="card">
<h2>📐 แปลง mol ↔ g</h2>
<div class="input-row">
<input id="solverInput" placeholder="เช่น 2 mol H2O to g">
<button onclick="processSolver()">คำนวณ</button>
</div>
<div id="solverResult"></div>
<div id="solverExplanation"></div>
</div>

<div class="footer">
Made for GitHub Pages 🚀
</div>

</div>

<script>
function getMolarMass(substance){
const data={h2o:18.015,co2:44.01,o2:32,h2:2.016,nacl:58.44,naoh:40,hcl:36.46,h2so4:98.08};
return data[substance.toLowerCase()]||null;
}

function processEquation(){
const input=document.getElementById("equationInput").value.replace(/\s+/g,'');
const result=document.getElementById("result");

if(input==="H2+O2=H2O"||input==="H2+O2->H2O"){
result.innerHTML="<div class='result'>✅ 2H₂ + O₂ = 2H₂O</div>";
}else{
result.innerHTML="<div class='info'>รองรับตัวอย่าง H₂ + O₂ → H₂O ในเวอร์ชันนี้</div>";
}
}

function processSolver(){
const input=document.getElementById("solverInput").value.trim().toLowerCase();
const result=document.getElementById("solverResult");
const explain=document.getElementById("solverExplanation");

const p=input.split(/\s+/);

if(p.length<5){
result.innerHTML="<div class='info'>ตัวอย่าง: 2 mol h2o to g</div>";
return;
}

const value=parseFloat(p[0]);
const from=p[1];
const substance=p[2];
const to=p[4];

const mw=getMolarMass(substance);

if(!mw){
result.innerHTML="<div class='info'>ไม่พบข้อมูลสาร</div>";
return;
}

if(from==="mol"&&to==="g"){
const ans=value*mw;
result.innerHTML=`<div class='result'>${ans.toFixed(3)} g</div>`;
explain.innerHTML=`<div class='info'>สูตร: g = mol × MW = ${value} × ${mw}</div>`;
}
else if(from==="g"&&to==="mol"){
const ans=value/mw;
result.innerHTML=`<div class='result'>${ans.toFixed(4)} mol</div>`;
explain.innerHTML=`<div class='info'>สูตร: mol = g ÷ MW = ${value} ÷ ${mw}</div>`;
}
}
</script>
</body>
</html>
